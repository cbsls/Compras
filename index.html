<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamados</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f766e;
  color:#111;
}

.header {
  background:#0f766e;
  color:#fff;
  padding:20px;
}

.card {
  background:#fff;
  margin:10px;
  padding:15px;
  border-radius:14px;
}

.btn {
  background:#2563eb;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#fff;
  padding:10px;
}

.hidden { display:none }
.item { cursor:pointer }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h3>Login</h3>
    <input id="idFunc" placeholder="ID">
    <input id="senha" type="password" placeholder="Senha">
    <button class="btn" onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="header">
  <h3 id="nome"></h3>
  <h2 id="saldo"></h2>
  <button id="btnAdmin" class="btn hidden">ADMIN</button>
</div>

<!-- HOME -->
<div id="home">

  <div class="card">
    <button class="btn" onclick="abrirNova('Reparo')">Reparo</button>
    <button class="btn" onclick="abrirNova('Compra')">Compra</button>
  </div>

  <div id="lista"></div>

</div>

<!-- NOVO -->
<div id="novo" class="hidden card">
  <h3>Novo Chamado</h3>

  <select id="tipo">
    <option>Reparo</option>
    <option>Compra</option>
  </select>

  <input id="titulo" placeholder="Título">
  <textarea id="descricao"></textarea>
  <input id="link" placeholder="Link">

  <button class="btn" onclick="criar()">Salvar</button>
</div>

<!-- MODAL -->
<div id="modal" class="hidden card">
  <h3 id="mTitulo"></h3>
  <p id="mDesc"></p>

  <div id="adminArea" class="hidden">
    <select id="mStatus">
      <option>Aberto</option>
      <option>Em Orçamento</option>
      <option>Reparado</option>
      <option>Comprado</option>
      <option>Finalizado</option>
    </select>

    <input id="mValor" placeholder="Valor">
    <input id="mData" type="date">

    <button class="btn" onclick="salvarAdmin()">Salvar</button>
  </div>

  <button onclick="fecharModal()">Fechar</button>
</div>

</div>

<div class="nav hidden" id="nav">
  <button onclick="show('home')">Início</button>
  <button onclick="show('novo')">Novo</button>
</div>

<script>

const supabaseClient = window.supabase.createClient(
  'https://azltlpjyyqecurmebffm.supabase.co',
  'sb_publishable_ODDfIVnGOb1csV9DA8kURQ_pbKPeQNO'
)

let user = null
let isAdmin = false
let chamadoAtual = null

async function login() {
  const id = idFunc.value
  const senha = document.getElementById('senha').value

  const { data } = await supabaseClient
    .from('usuarios')
    .select('*')
    .eq('id_func', id)
    .single()

  if (!data || data.senha !== senha) return alert('Erro login')

  user = data
  isAdmin = data.tipo === 'admin'

  nome.innerText = data.nome_guerra || data.nome

  if (isAdmin) btnAdmin.classList.remove('hidden')

  loginDiv = document.getElementById('login')
  loginDiv.classList.add('hidden')
  app.classList.remove('hidden')
  nav.classList.remove('hidden')

  carregarSaldo()
  carregarChamados()
}

async function carregarSaldo() {
  const { data } = await supabaseClient.from('financeiro').select('*').single()
  saldo.innerText = 'R$ ' + Number(data.saldo_atual).toFixed(2)
}

async function carregarChamados() {
  const { data } = await supabaseClient
    .from('chamados')
    .select('*')
    .order('id', { ascending:false })

  lista.innerHTML = ''

  data.forEach(c => {
    lista.innerHTML += `
      <div class="card item" onclick="abrirModal('${c.id}')">
        <b>${c.titulo}</b><br>
        ${c.status}
      </div>`
  })
}

async function abrirModal(id) {
  const { data } = await supabaseClient
    .from('chamados')
    .select('*')
    .eq('id', id)
    .single()

  chamadoAtual = data

  mTitulo.innerText = data.titulo
  mDesc.innerText = data.descricao

  modal.classList.remove('hidden')

  if (isAdmin) {
    adminArea.classList.remove('hidden')
    mStatus.value = data.status
    mValor.value = data.valor_final || ''
  }
}

function fecharModal() {
  modal.classList.add('hidden')
}

async function salvarAdmin() {
  await supabaseClient.from('chamados').update({
    status: mStatus.value,
    valor_final: mValor.value,
    data_execucao: mData.value
  }).eq('id', chamadoAtual.id)

  fecharModal()
  carregarChamados()
}

async function criar() {
  await supabaseClient.from('chamados').insert({
    tipo: tipo.value,
    titulo: titulo.value,
    descricao: descricao.value,
    link: link.value,
    status: 'Aberto',
    id_usuario: user.id
  })

  alert('Criado')
  show('home')
  carregarChamados()
}

function show(tela) {
  home.classList.add('hidden')
  novo.classList.add('hidden')

  document.getElementById(tela).classList.remove('hidden')
}

function abrirNova(tipoSel) {
  show('novo')
  tipo.value = tipoSel
}

</script>

</body>
</html>
