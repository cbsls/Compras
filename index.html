<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamados CB SLS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f766e">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:system-ui;
  background:#eef2f7;
  color:#0f172a;
}

/* LOGIN */

.login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.login-card{
  width:100%;
  max-width:420px;
  background:#fff;
  border-radius:28px;
  padding:24px;
  box-shadow:0 5px 20px rgba(0,0,0,.12);
}

.login-title{
  font-size:28px;
  font-weight:800;
  margin-bottom:20px;
}

.input{
  width:100%;
  border:none;
  background:#f1f5f9;
  padding:15px;
  border-radius:16px;
  margin-top:12px;
  font-size:15px;
}

.btn{
  border:none;
  background:#2563eb;
  color:#fff;
  padding:14px;
  border-radius:16px;
  font-weight:700;
  cursor:pointer;
}

.btn-full{
  width:100%;
  margin-top:14px;
}

/* APP */

.hidden{
  display:none !important;
}

.header{
  background:linear-gradient(135deg,#0f766e,#115e59);
  color:#fff;
  padding:22px;
  border-radius:0 0 30px 30px;
  position:sticky;
  top:0;
  z-index:100;
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.user-name{
  font-size:28px;
  font-weight:900;
}

.user-sub{
  opacity:.9;
  margin-top:4px;
}

.admin-badge{
  background:#14b8a6;
  padding:10px 14px;
  border-radius:16px;
  font-weight:800;
  font-size:13px;
}

.saldo{
  font-size:42px;
  font-weight:900;
  margin-top:18px;
}

.top-actions{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.top-actions button{
  flex:1;
}

/* DASH */

.dashboard{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:14px;
}

.dash-card{
  background:#fff;
  border-radius:22px;
  padding:16px;
  text-align:center;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.dash-number{
  font-size:28px;
  font-weight:900;
  color:#0f766e;
}

.dash-label{
  color:#64748b;
  font-size:12px;
  margin-top:6px;
}

/* FILTRO */

.filtro-area{
  padding:0 14px;
}

.search{
  width:100%;
  border:none;
  background:#fff;
  padding:15px;
  border-radius:18px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.status-filtros{
  display:flex;
  gap:10px;
  overflow:auto;
  padding:14px 0;
}

.status-btn{
  border:none;
  background:#fff;
  padding:12px 16px;
  border-radius:999px;
  white-space:nowrap;
  font-weight:700;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  cursor:pointer;
}

.status-btn.active{
  background:#0f766e;
  color:#fff;
}

/* LISTA */

#lista{
  padding:14px;
  padding-bottom:120px;
}

.item{
  background:#fff;
  border-radius:24px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  cursor:pointer;
  transition:.2s;
}

.item:active{
  transform:scale(.98);
}

.item-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.item-title{
  font-size:24px;
  font-weight:900;
}

.item-desc{
  margin-top:10px;
  color:#64748b;
  line-height:1.4;
}

.item-footer{
  margin-top:16px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
  color:#475569;
}

.status{
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.aberto{
  background:#dbeafe;
  color:#1d4ed8;
}

.orcamento{
  background:#fef3c7;
  color:#b45309;
}

.comprado{
  background:#ede9fe;
  color:#7c3aed;
}

.reparado{
  background:#dcfce7;
  color:#15803d;
}

/* NOVO */

#novo{
  padding:14px;
  padding-bottom:120px;
}

.form-card{
  background:#fff;
  border-radius:24px;
  padding:20px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* NAV */

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:14px 0;
  box-shadow:0 -5px 20px rgba(0,0,0,.12);
  border-radius:24px 24px 0 0;
  z-index:999;
}

.nav button{
  border:none;
  background:none;
  font-size:28px;
  cursor:pointer;
}

/* MODAL */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:flex;
  align-items:flex-end;
  z-index:9999;
}

.modal-content{
  width:100%;
  background:#fff;
  border-radius:28px 28px 0 0;
  padding:24px;
  max-height:90vh;
  overflow:auto;
}

.modal-title{
  font-size:28px;
  font-weight:900;
}

.info{
  margin-top:18px;
  color:#475569;
  line-height:1.6;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginScreen" class="login-screen">

  <div class="login-card">

    <div class="login-title">
      Sistema de Chamados
    </div>

    <input
      id="idFunc"
      class="input"
      placeholder="ID Funcional"
    >

    <input
      id="senha"
      type="password"
      class="input"
      placeholder="Senha"
    >

    <button
      class="btn btn-full"
      onclick="login()"
    >
      Entrar
    </button>

  </div>

</div>

<!-- APP -->

<div id="app" class="hidden">

  <!-- HEADER -->

  <div class="header">

    <div class="header-top">

      <div>

        <div id="nome" class="user-name">
          -
        </div>

        <div class="user-sub">
          CB São Lourenço do Sul
        </div>

      </div>

      <div id="adminBadge" class="admin-badge hidden">
        ADMIN
      </div>

    </div>

    <div id="saldo" class="saldo">
      R$ 0,00
    </div>

    <div class="top-actions">

      <button
        class="btn"
        onclick="ajustarSaldo()"
      >
        💰 Ajustar Saldo
      </button>

      <button
        id="btnAdmin"
        class="btn"
        onclick="toggleAdmin()"
      >
        🔐 Entrar Admin
      </button>

    </div>

  </div>

  <!-- DASH -->

  <div class="dashboard">

    <div class="dash-card">
      <div id="dTotal" class="dash-number">0</div>
      <div class="dash-label">Total</div>
    </div>

    <div class="dash-card">
      <div id="dAberto" class="dash-number">0</div>
      <div class="dash-label">Abertos</div>
    </div>

    <div class="dash-card">
      <div id="dOrcamento" class="dash-number">0</div>
      <div class="dash-label">Orçamento</div>
    </div>

    <div class="dash-card">
      <div id="dFinal" class="dash-number">0</div>
      <div class="dash-label">Finalizados</div>
    </div>

  </div>

  <!-- FILTRO -->

  <div class="filtro-area">

    <input
      id="busca"
      class="search"
      placeholder="Buscar chamado..."
      onkeyup="filtrarChamados()"
    >

    <div class="status-filtros">

      <button class="status-btn active" onclick="filtrarStatus('Todos', this)">
        Todos
      </button>

      <button class="status-btn" onclick="filtrarStatus('Aberto', this)">
        Abertos
      </button>

      <button class="status-btn" onclick="filtrarStatus('Em Orçamento', this)">
        Em Orçamento
      </button>

      <button class="status-btn" onclick="filtrarStatus('Comprado', this)">
        Comprado
      </button>

      <button class="status-btn" onclick="filtrarStatus('Reparado', this)">
        Reparado
      </button>

    </div>

  </div>

  <!-- LISTA -->

  <div id="lista"></div>

  <!-- NOVO -->

  <div id="novo" class="hidden">

    <div class="form-card">

      <h2>Novo Chamado</h2>

      <select id="tipo" class="input">
        <option>Reparo</option>
        <option>Compra</option>
      </select>

      <input
        id="titulo"
        class="input"
        placeholder="Título"
      >

      <textarea
        id="descricao"
        class="input"
        placeholder="Descrição"
      ></textarea>

      <input
        id="link"
        class="input"
        placeholder="Link / Referência"
      >

      <button
        class="btn btn-full"
        onclick="criar()"
      >
        Salvar Chamado
      </button>

    </div>

  </div>

</div>

<!-- MODAL -->

<div id="modal" class="modal hidden">

  <div class="modal-content">

    <div id="mTitulo" class="modal-title"></div>

    <div id="mDesc" class="info"></div>

    <div id="mInfo" class="info"></div>

    <div id="adminArea" class="hidden">

      <select id="mStatus" class="input">
        <option>Aberto</option>
        <option>Em Orçamento</option>
        <option>Comprado</option>
        <option>Reparado</option>
      </select>

      <input
        id="mValor"
        class="input"
        placeholder="Valor"
      >

      <input
        id="mData"
        type="date"
        class="input"
      >

      <button
        class="btn btn-full"
        onclick="salvarAdmin()"
      >
        Salvar Alterações
      </button>

    </div>

    <button
      class="btn btn-full"
      style="margin-top:14px;background:#0f766e"
      onclick="fecharModal()"
    >
      Fechar
    </button>

  </div>

</div>

<!-- NAV -->

<div id="nav" class="nav hidden">

  <button onclick="mostrarLista()">
    🏠
  </button>

  <button onclick="mostrarNovo()">
    ➕
  </button>

</div>

<script>

const supabaseClient = window.supabase.createClient(
  'https://azltlpjyyqecurmebffm.supabase.co',
  'sb_publishable_ODDfIVnGOb1csV9DA8kURQ_pbKPeQNO'
)

let user = null
let isAdmin = false
let atual = null
let chamadosCache = []
let filtroAtual = 'Todos'

// LOGIN

async function login(){

  const id = document.getElementById('idFunc').value.trim()
  const senha = document.getElementById('senha').value.trim()

  if(!id || !senha){
    alert('Informe login e senha')
    return
  }

  const { data, error } = await supabaseClient
    .from('usuarios')
    .select('*')
    .eq('id_func', id)
    .single()

  if(error || !data || data.senha !== senha){
    alert('Login inválido')
    return
  }

  user = data

  document.getElementById('nome').innerText =
    data.nome_guerra || data.nome

  document.getElementById('loginScreen')
    .classList.add('hidden')

  document.getElementById('app')
    .classList.remove('hidden')

  document.getElementById('nav')
    .classList.remove('hidden')

  carregarSaldo()
  carregarChamados()
}

// ADMIN

function toggleAdmin(){

  if(isAdmin){

    isAdmin = false

    document.getElementById('adminBadge')
      .classList.add('hidden')

    document.getElementById('btnAdmin')
      .innerText = '🔐 Entrar Admin'

    alert('Modo admin encerrado')

    return
  }

  const senha = prompt('Senha Admin')

  if(senha === '123456'){

    isAdmin = true

    document.getElementById('adminBadge')
      .classList.remove('hidden')

    document.getElementById('btnAdmin')
      .innerText = '🚪 Sair Admin'

    alert('Modo admin ativado')

  }else{

    alert('Senha inválida')
  }
}

// SALDO

async function carregarSaldo(){

  const { data } = await supabaseClient
    .from('financeiro')
    .select('*')
    .single()

  document.getElementById('saldo').innerText =
    'R$ ' + Number(data?.saldo_atual || 0).toFixed(2)
}

async function ajustarSaldo(){

  if(!isAdmin){
    alert('Somente admin')
    return
  }

  const valor = prompt('Novo saldo:')

  if(!valor || isNaN(valor)) return

  const { error } = await supabaseClient
    .from('financeiro')
    .update({
      saldo_atual:Number(valor)
    })
    .eq('id',1)

  if(error){
    console.log(error)
    alert('Erro ao ajustar saldo')
    return
  }

  carregarSaldo()
}

// CHAMADOS

async function carregarChamados(){

  const scrollAtual = window.scrollY

  const { data, error } = await supabaseClient
    .from('chamados')
    .select('*')
    .order('id',{ascending:false})

  if(error){
    console.log(error)
    return
  }

  chamadosCache = data || []

  renderChamados()

  atualizarDashboard()

  window.scrollTo(0, scrollAtual)
}

function atualizarDashboard(){

  document.getElementById('dTotal').innerText =
    chamadosCache.length

  document.getElementById('dAberto').innerText =
    chamadosCache.filter(c =>
      c.status === 'Aberto'
    ).length

  document.getElementById('dOrcamento').innerText =
    chamadosCache.filter(c =>
      c.status === 'Em Orçamento'
    ).length

  document.getElementById('dFinal').innerText =
    chamadosCache.filter(c =>
      c.status === 'Comprado' ||
      c.status === 'Reparado'
    ).length
}

function renderChamados(){

  const lista = document.getElementById('lista')

  lista.innerHTML = ''

  let listaFiltrada = [...chamadosCache]

  const termo = document.getElementById('busca')
    .value.toLowerCase()

  if(termo){

    listaFiltrada = listaFiltrada.filter(c => {

      return (
        (c.titulo || '').toLowerCase().includes(termo) ||
        (c.descricao || '').toLowerCase().includes(termo)
      )
    })
  }

  if(filtroAtual !== 'Todos'){

    listaFiltrada = listaFiltrada.filter(c =>
      c.status === filtroAtual
    )
  }

  if(listaFiltrada.length === 0){

    lista.innerHTML = `
      <div class="item">
        Nenhum chamado encontrado
      </div>
    `

    return
  }

  listaFiltrada.forEach(c => {

    let classe = 'aberto'

    if(c.status === 'Em Orçamento')
      classe = 'orcamento'

    if(c.status === 'Comprado')
      classe = 'comprado'

    if(c.status === 'Reparado')
      classe = 'reparado'

    const div = document.createElement('div')

    div.className = 'item'

    div.innerHTML = `

      <div class="item-top">

        <div class="item-title">
          ${c.titulo || '-'}
        </div>

        <div class="status ${classe}">
          ${c.status || '-'}
        </div>

      </div>

      <div class="item-desc">
        ${c.descricao || 'Sem descrição'}
      </div>

      <div class="item-footer">

        <div>
          💰 R$ ${Number(c.valor_final || 0).toFixed(2)}
        </div>

        <div>
          📅 ${c.data_execucao || '-'}
        </div>

      </div>
    `

    div.onclick = () => abrirModal(c.id)

    lista.appendChild(div)
  })
}

// FILTROS

function filtrarChamados(){
  renderChamados()
}

function filtrarStatus(status, el){

  filtroAtual = status

  document.querySelectorAll('.status-btn')
    .forEach(btn => btn.classList.remove('active'))

  el.classList.add('active')

  renderChamados()
}

// MODAL

async function abrirModal(id){

  const { data, error } = await supabaseClient
    .from('chamados')
    .select('*')
    .eq('id', id)
    .single()

  if(error || !data){
    alert('Erro ao abrir chamado')
    return
  }

  atual = data

  document.getElementById('mTitulo').innerText =
    data.titulo || '-'

  document.getElementById('mDesc').innerText =
    data.descricao || '-'

  document.getElementById('mInfo').innerHTML = `
    <b>Tipo:</b> ${data.tipo || '-'}<br><br>
    <b>Status:</b> ${data.status || '-'}<br><br>
    <b>Valor:</b> R$ ${Number(data.valor_final || 0).toFixed(2)}<br><br>
    <b>Data:</b> ${data.data_execucao || '-'}<br><br>

    ${
      data.link
      ? `<a href="${data.link}" target="_blank">🔗 Abrir Link</a>`
      : ''
    }
  `

  document.getElementById('modal')
    .classList.remove('hidden')

  if(isAdmin){

    document.getElementById('adminArea')
      .classList.remove('hidden')

    document.getElementById('mStatus').value =
      data.status || 'Aberto'

    document.getElementById('mValor').value =
      data.valor_final || ''

    document.getElementById('mData').value =
      data.data_execucao || ''

  }else{

    document.getElementById('adminArea')
      .classList.add('hidden')
  }
}

function fecharModal(){

  document.getElementById('modal')
    .classList.add('hidden')
}

// SALVAR ADMIN

async function salvarAdmin(){

  if(!isAdmin){
    alert('Somente admin')
    return
  }

  const valor = Number(
    document.getElementById('mValor').value || 0
  )

  const status =
    document.getElementById('mStatus').value

  const dataExec =
    document.getElementById('mData').value

  const valorAnterior =
    Number(atual.valor_final || 0)

  const statusAnterior =
    atual.status

  const { error } = await supabaseClient
    .from('chamados')
    .update({
      status:status,
      valor_final:valor,
      data_execucao:dataExec
    })
    .eq('id', atual.id)

  if(error){
    console.log(error)
    alert('Erro ao salvar')
    return
  }

  // DESCONTO SOMENTE EM COMPRADO OU REPARADO

  const novoDebito =
    (status === 'Comprado' || status === 'Reparado')

  const jaDebitado =
    (statusAnterior === 'Comprado' || statusAnterior === 'Reparado')

  if(novoDebito && !jaDebitado){

    const { data } = await supabaseClient
      .from('financeiro')
      .select('*')
      .single()

    const novoSaldo =
      Number(data.saldo_atual || 0) - valor

    await supabaseClient
      .from('financeiro')
      .update({
        saldo_atual:novoSaldo
      })
      .eq('id',1)
  }

  fecharModal()

  carregarChamados()
  carregarSaldo()
}

// CRIAR

async function criar(){

  const titulo =
    document.getElementById('titulo').value.trim()

  if(!titulo){
    alert('Informe o título')
    return
  }

  const payload = {

    tipo:
      document.getElementById('tipo').value,

    titulo:titulo,

    descricao:
      document.getElementById('descricao').value,

    link:
      document.getElementById('link').value,

    status:'Aberto',

    id_usuario:user.id_func
  }

  const { error } = await supabaseClient
    .from('chamados')
    .insert([payload])

  if(error){

    console.log(error)

    alert(
      'Erro ao criar chamado.\n' +
      'Verifique as colunas da tabela chamados.'
    )

    return
  }

  alert('Chamado criado')

  document.getElementById('titulo').value = ''
  document.getElementById('descricao').value = ''
  document.getElementById('link').value = ''

  mostrarLista()

  carregarChamados()
}

// NAVEGAÇÃO

function mostrarNovo(){

  document.getElementById('novo')
    .classList.remove('hidden')

  document.getElementById('lista')
    .classList.add('hidden')

  document.querySelector('.dashboard')
    .classList.add('hidden')

  document.querySelector('.filtro-area')
    .classList.add('hidden')
}

function mostrarLista(){

  document.getElementById('novo')
    .classList.add('hidden')

  document.getElementById('lista')
    .classList.remove('hidden')

  document.querySelector('.dashboard')
    .classList.remove('hidden')

  document.querySelector('.filtro-area')
    .classList.remove('hidden')
}

// AUTO UPDATE

setInterval(() => {
  carregarChamados()
}, 15000)

// SERVICE WORKER

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js')
}

</script>

</body>
</html>
