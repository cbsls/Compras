<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Reclamações - Bombeiros RS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .card {
            flex: 1;
            min-width: 300px;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        .card h2 {
            margin-bottom: 20px;
            color: #555;
            font-size: 1.5em;
        }
        label {
            display: block;
            margin-bottom: 15px;
            font-weight: 500;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .section h2 {
            margin-bottom: 20px;
            color: #555;
            font-size: 1.8em;
        }
        #listaChamados {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }
        .acao-btn {
            background: #28a745;
            padding: 6px 12px;
            font-size: 14px;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        .acao-encaminhar {
            background: #ffc107;
            color: #000;
        }
        .acao-finalizar {
            background: #dc3545;
        }
        @media (max-width: 768px) {
            .cards {
                flex-direction: column;
            }
            header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛠️ Central de Reclamações - Bombeiros RS</h1>
        </header>
        <div class="cards">
            <div class="card">
                <h2>👤 Dados do solicitante</h2>
                <label>
                    Nome:
                    <input type="text" id="nome" placeholder="Digite o nome em MAIÚSCULAS" maxlength="100" oninput="handleUpper(this)">
                </label>
                <label>
                    Militar:
                    <select id="militar">
                        <option value="">Não identificado</option>
                        <option value="CB João da Silva">CB João da Silva</option>
                        <option value="3º SGT Ana Costa">3º SGT Ana Costa</option>
                        <option value="Asp Rubens Lima">Asp Rubens Lima</option>
                        <option value="Cap Elaine Santos">Cap Elaine Santos</option>
                        <option value="Maj Pedro Almeida">Maj Pedro Almeida</option>
                        <option value="Ten Carla Mendes">Ten Carla Mendes</option>
                        <option value="2º Ten Marcos Souza">2º Ten Marcos Souza</option>
                    </select>
                </label>
                <button onclick="salvarSolicitante()">Salvar Dados</button>
            </div>
            <div class="card">
                <h2>💬 Novo chamado</h2>
                <label>
                    Título:
                    <input type="text" id="titulo" placeholder="TÍTULO DO CHAMADO" maxlength="200" required oninput="handleUpper(this)">
                </label>
                <label>
                    Local:
                    <input type="text" id="local" placeholder="LOCAL DO OCORRIDO" maxlength="200" required oninput="handleUpper(this)">
                </label>
                <label>
                    Descrição:
                    <textarea id="descricao" placeholder="Descreva o problema (opcional)" rows="4"></textarea>
                </label>
                <button onclick="criarChamado()">Criar Chamado</button>
            </div>
        </div>
        <div class="section">
            <h2>📋 Chamados</h2>
            <div id="listaChamados">Carregando...</div>
        </div>
    </div>
    <script>
        let chamados = [];
        let solicitante = { nome: '', militar: '' };

        function handleUpper(el) {
            el.value = el.value.toUpperCase();
        }

        function init() {
            loadData();
            loadSolicitante();
            renderLista();
        }

        function loadSolicitante() {
            const saved = localStorage.getItem('solicitante');
            if (saved) {
                solicitante = JSON.parse(saved);
                document.getElementById('nome').value = solicitante.nome;
                document.getElementById('militar').value = solicitante.militar;
            }
        }

        function salvarSolicitante() {
            solicitante.nome = document.getElementById('nome').value.trim();
            solicitante.militar = document.getElementById('militar').value;
            localStorage.setItem('solicitante', JSON.stringify(solicitante));
            alert('Dados do solicitante salvos!');
        }

        function criarChamado() {
            const titulo = document.getElementById('titulo').value.trim();
            const local = document.getElementById('local').value.trim();
            const descricao = document.getElementById('descricao').value.trim();

            if (!titulo || !local) {
                alert('Título e Local são obrigatórios!');
                return;
            }

            const chamado = {
                id: Date.now(),
                nome: solicitante.nome || 'NÃO IDENTIFICADO',
                militar: solicitante.militar || 'Não identificado',
                titulo,
                local,
                descricao,
                valorCompra: '',
                dataCompra: '',
                status: 'Novo',
                dataCriacao: new Date().toLocaleString('pt-BR')
            };

            chamados.unshift(chamado); // Add to top
            saveChamados();
            renderLista();

            // Clear form
            document.getElementById('titulo').value = '';
            document.getElementById('local').value = '';
            document.getElementById('descricao').value = '';

            alert('Chamado criado com sucesso!');
        }

        function loadData() {
            const saved = localStorage.getItem('chamados');
            if (saved) {
                chamados = JSON.parse(saved);
            }
        }

        function saveChamados() {
            localStorage.setItem('chamados', JSON.stringify(chamados));
        }

        function renderLista() {
            const lista = document.getElementById('listaChamados');
            if (chamados.length === 0) {
                lista.innerHTML = '<p style="text-align: center; padding: 40px; font-size: 1.2em; color: #888;">Nenhum chamado cadastrado.</p>';
                return;
            }

            let html = '<table><thead><tr>' +
                '<th>ID</th>' +
                '<th>Nome</th>' +
                '<th>Militar</th>' +
                '<th>Título</th>' +
                '<th>Local</th>' +
                '<th>Valor da Compra</th>' +
                '<th>Data da Compra</th>' +
                '<th>Status</th>' +
                '<th>Data Criação</th>' +
                '<th>Ações</th>' +
                '</tr></thead><tbody>';

            chamados.forEach(c => {
                html += `<tr>
                    <td>${c.id}</td>
                    <td>${c.nome}</td>
                    <td>${c.militar}</td>
                    <td>${c.titulo}</td>
                    <td>${c.local}</td>
                    <td>${c.valorCompra || ''}</td>
                    <td>${c.dataCompra || ''}</td>
                    <td style="font-weight: bold;">${c.status}</td>
                    <td>${c.dataCriacao}</td>
                    <td>
                        <button class="acao-btn" onclick="atualizarStatus(${c.id}, 'Em Andamento')">Em Andamento</button>
                        <br>
                        <button class="acao-btn acao-encaminhar" onclick="atualizarStatus(${c.id}, 'Encaminhado')">Encaminhar</button>
                        <br>
                        <button class="acao-btn acao-finalizar" onclick="atualizarStatus(${c.id}, 'Finalizado')">Finalizar</button>
                    </td>
                </tr>`;
            });

            html += '</tbody></table>';
            lista.innerHTML = html;
        }

        function atualizarStatus(id, novoStatus) {
            const chamado = chamados.find(c => c.id == id);
            if (!chamado) return;

            const valor = prompt('Valor da Compra (ex: R$ 100,00, opcional):');
            const dataC = prompt('Data da Compra (ex: 01/01/2024, opcional):');

            chamado.valorCompra = valor ? valor.trim() : '';
            chamado.dataCompra = dataC ? dataC.trim() : '';
            chamado.status = novoStatus;
            chamado.dataAtualizacao = new Date().toLocaleString('pt-BR');

            saveChamados();
            renderLista();
            alert(`Status atualizado para ${novoStatus}!`);
        }

        // PWA basic setup
        if ('serviceWorker' in navigator) {
            // Simple inline SW for cache (optional, basic)
            navigator.serviceWorker.register(URL.createObjectURL(new Blob([`
                self.addEventListener('install', e => {
                    self.skipWaiting();
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(fetch(e.request));
                });
            `], {type: 'application/javascript'})));
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
