<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HelpDesk Interno</title>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

// ✅ CONFIGURAÇÃO CORRETA
const SUPABASE_URL = 'https://azltlpjyyqecurmebffm.supabase.co'
const SUPABASE_KEY = 'sb_publishable_ODDfIVnGOb1csV9DA8kURQ_pbKPeQNO'

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

window.supabase = supabase
</script>

<style>
* { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }

body {
  margin: 0;
  padding: 20px;
  background: #eef2f7;
  color: #1f2937;
}

.container {
  max-width: 1000px;
  margin: auto;
  background: #fff;
  border-radius: 18px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1 {
  margin-top: 0;
  color: #0f4c81;
}

h2 {
  margin-top: 24px;
  color: #0f4c81;
}

input, textarea, select, button {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #cbd5e1;
}

textarea {
  min-height: 90px;
}

button {
  background: #0f4c81;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.95;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: #f8fafc;
  border-radius: 12px;
  padding: 12px;
  margin-top: 12px;
  border: 1px solid #e2e8f0;
}

.status {
  font-weight: bold;
  margin-top: 8px;
}

.muted {
  color: #64748b;
}

@media (max-width: 700px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="container">

<h1>🛠️ HelpDesk Interno</h1>
<div class="muted">Registro e acompanhamento de chamados</div>

<h2>👤 Identificação</h2>

<input id="nome" placeholder="Digite seu nome">
<input id="matricula" placeholder="Digite sua matrícula">

<h2>📋 Abrir chamado</h2>

<input id="titulo" placeholder="Título do chamado">
<textarea id="descricao" placeholder="Descrição do problema"></textarea>

<div class="grid">
  <input id="local" placeholder="Local">
  
  <select id="prioridade">
    <option value="Baixa">Baixa</option>
    <option value="Média" selected>Média</option>
    <option value="Alta">Alta</option>
  </select>
</div>

<button onclick="abrirChamado()">Registrar chamado</button>

<hr>

<h2>📂 Chamados</h2>

<input id="busca" placeholder="Buscar chamado">

<div id="lista"></div>

</div>

<script type="module">

const $ = (id) => document.getElementById(id)
let chamados = []

// 🔹 CRIAR CHAMADO
async function abrirChamado() {
  const nome = $('nome').value.trim()
  const matricula = $('matricula').value.trim()
  const titulo = $('titulo').value.trim()
  const descricao = $('descricao').value.trim()
  const local = $('local').value.trim()
  const prioridade = $('prioridade').value

  if (!nome || !matricula || !titulo) {
    alert("Preencha nome, matrícula e título")
    return
  }

  try {
    const { error } = await supabase.from('chamados').insert([{
      nome_solicitante: nome,
      matricula_solicitante: matricula,
      titulo,
      descricao,
      local,
      prioridade,
      status: "Aguardando triagem"
    }])

    if (error) {
      alert("Erro: " + error.message)
      console.error(error)
      return
    }

    alert("Chamado registrado com sucesso")

    limpar()
    carregar()

  } catch (e) {
    alert("Erro conexão: " + e.message)
    console.error(e)
  }
}

// 🔹 LISTAR CHAMADOS
async function carregar() {
  try {
    const { data, error } = await supabase
      .from('chamados')
      .select('*')
      .order('created_at', { ascending: false })

    if (error) {
      document.getElementById('lista').innerHTML = "Erro ao carregar"
      console.error(error)
      return
    }

    chamados = data || []
    render()

  } catch (e) {
    document.getElementById('lista').innerHTML = "Erro de conexão"
    console.error(e)
  }
}

// 🔹 RENDER
function render() {
  const busca = $('busca').value.toLowerCase()

  const filtrados = chamados.filter(c =>
    JSON.stringify(c).toLowerCase().includes(busca)
  )

  if (!filtrados.length) {
    $('lista').innerHTML = "Nenhum chamado encontrado"
    return
  }

  $('lista').innerHTML = filtrados.map(c => `
    <div class="card">
      <b>${c.titulo}</b><br>
      ${c.descricao || ''}<br>
      📍 ${c.local || '-'}<br>
      👤 ${c.nome_solicitante} (${c.matricula_solicitante})<br>
      ⚡ ${c.prioridade}<br>
      🏢 ${c.setor_responsavel || 'Não definido'}<br>
      <div class="status">📌 ${c.status}</div>
    </div>
  `).join('')
}

// 🔹 LIMPAR
function limpar() {
  $('titulo').value = ''
  $('descricao').value = ''
  $('local').value = ''
}

// 🔹 EVENTOS
$('busca').addEventListener('input', render)

// 🔹 INIT
carregar()

window.abrirChamado = abrirChamado

</script>

</body>
</html>
