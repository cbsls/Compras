<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📋 Chamados CB SLS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#075E54">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,Helvetica,sans-serif;
}

body{
  background:linear-gradient(
    180deg,
    #075E54 0 120px,
    #efeae2 120px 100%
  );
  color:#111b21;
}

/* LOGIN */

.login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.login-card{
  width:100%;
  max-width:420px;
  background:#fff;
  border-radius:22px;
  padding:24px;
  box-shadow:0 5px 20px rgba(0,0,0,.12);
}

.login-title{
  font-size:28px;
  font-weight:900;
  margin-bottom:20px;
  color:#075E54;
}

.input{
  width:100%;
  border:none;
  background:#f1f5f9;
  padding:15px;
  border-radius:14px;
  margin-top:12px;
  font-size:15px;
}

.btn{
  border:none;
  background:#075E54;
  color:#fff;
  padding:14px;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
}

.btn-full{
  width:100%;
  margin-top:14px;
}

/* APP */

.hidden{
  display:none !important;
}

.header{
  background:linear-gradient(
    180deg,
    #075E54,
    #0b7064
  );
  color:#fff;
  padding:22px;
  border-radius:0 0 30px 30px;
  position:sticky;
  top:0;
  z-index:100;
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.user-name{
  font-size:28px;
  font-weight:900;
}

.user-sub{
  opacity:.9;
  margin-top:4px;
}

.admin-badge{
  background:#25D366;
  padding:10px 14px;
  border-radius:16px;
  font-weight:800;
  font-size:13px;
}

.saldo{
  font-size:42px;
  font-weight:900;
  margin-top:18px;
}

.top-actions{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.top-actions button{
  flex:1;
}

/* DASH */

.dashboard{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:14px;
}

.dash-card{
  background:#fff;
  border-radius:18px;
  padding:16px;
  text-align:center;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.dash-number{
  font-size:28px;
  font-weight:900;
  color:#075E54;
}

.dash-label{
  color:#64748b;
  font-size:12px;
  margin-top:6px;
}

/* FILTROS */

.filtro-area{
  padding:0 14px;
}

.search{
  width:100%;
  border:none;
  background:#fff;
  padding:15px;
  border-radius:18px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.status-filtros{
  display:flex;
  gap:10px;
  overflow:auto;
  padding:14px 0;
}

.status-btn{
  border:none;
  background:#fff;
  padding:12px 16px;
  border-radius:999px;
  white-space:nowrap;
  font-weight:700;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  cursor:pointer;
}

.status-btn.active{
  background:#075E54;
  color:#fff;
}

/* LISTA */

#lista{
  padding:14px;
  padding-bottom:120px;
}

.item{
  background:#fff;
  border-radius:18px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.item-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.item-title{
  font-size:22px;
  font-weight:900;
}

.item-desc{
  margin-top:10px;
  color:#64748b;
  line-height:1.5;
}

.item-footer{
  margin-top:16px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
  color:#475569;
}

.status{
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.aberto{
  background:#dbeafe;
  color:#1d4ed8;
}

.emorcamento{
  background:#fef3c7;
  color:#b45309;
}

.finalizado{
  background:#dcfce7;
  color:#15803d;
}

.negado{
  background:#fee2e2;
  color:#b91c1c;
}

/* NOVO */

#novo{
  padding:14px;
  padding-bottom:120px;
}

.form-card{
  background:#fff;
  border-radius:18px;
  padding:20px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* NAV */

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:14px 0;
  box-shadow:0 -5px 20px rgba(0,0,0,.12);
  border-radius:22px 22px 0 0;
  z-index:999;
}

.nav button{
  border:none;
  background:none;
  font-size:28px;
  cursor:pointer;
}

/* MODAL */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:flex;
  align-items:flex-end;
  z-index:9999;
}

.modal-content{
  width:100%;
  background:#fff;
  border-radius:28px 28px 0 0;
  padding:24px;
  max-height:90vh;
  overflow:auto;
}

.modal-title{
  font-size:28px;
  font-weight:900;
}

.info{
  margin-top:18px;
  color:#475569;
  line-height:1.6;
}

.label{
  display:block;
  margin-top:16px;
  font-weight:800;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginScreen" class="login-screen">

  <div class="login-card">

    <div class="login-title">
      Sistema de Chamados
    </div>

    <input
      id="idFunc"
      class="input"
      placeholder="ID Funcional"
    >

    <input
      id="senha"
      type="password"
      class="input"
      placeholder="Senha"
    >

    <button
      class="btn btn-full"
      onclick="login()"
    >
      Entrar
    </button>

  </div>

</div>

<!-- APP -->

<div id="app" class="hidden">

  <div class="header">

    <div class="header-top">

      <div>

        <div id="nome" class="user-name">
          -
        </div>

        <div class="user-sub">
          CB São Lourenço do Sul
        </div>

      </div>

      <div
        id="adminBadge"
        class="admin-badge hidden"
      >
        ADMIN
      </div>

    </div>

    <div id="saldo" class="saldo">
      R$ 0,00
    </div>

    <div class="top-actions">

      <button
        class="btn"
        onclick="ajustarSaldo()"
      >
        💰 Saldo
      </button>

      <button
        id="btnAdmin"
        class="btn"
        onclick="toggleAdmin()"
      >
        🔐 Admin
      </button>

      <button
        class="btn"
        onclick="logout()"
      >
        🚪 Sair
      </button>

    </div>

  </div>

  <!-- DASH -->

  <div class="dashboard">

    <div class="dash-card">
      <div id="dTotal" class="dash-number">0</div>
      <div class="dash-label">Total</div>
    </div>

    <div class="dash-card">
      <div id="dAberto" class="dash-number">0</div>
      <div class="dash-label">Abertos</div>
    </div>

    <div class="dash-card">
  <div id="dOrcamento" class="dash-number">0</div>
  <div class="dash-label">Orçamento</div>
</div>

<div class="dash-card">
  <div id="dFinal" class="dash-number">0</div>
 <div class="dash-label">
  Comprados/Reparados
</div>
</div>

  </div>

  <!-- FILTRO -->

  <div class="filtro-area">

    <input
      id="busca"
      class="search"
      placeholder="Buscar chamado..."
      onkeyup="filtrarChamados()"
    >

    <div class="status-filtros">

      <button
        class="status-btn active"
        onclick="filtrarStatus('Todos', this)"
      >
        Todos
      </button>

      <button
        class="status-btn"
        onclick="filtrarStatus('Aberto', this)"
      >
        Aberto
      </button>

      <button
  class="status-btn"
  onclick="filtrarStatus('Em Orçamento', this)"
>
  Orçamento
</button>

<button
  class="status-btn"
  onclick="filtrarStatus('Comprado', this)"
>
  Comprado
</button>

<button
  class="status-btn"
  onclick="filtrarStatus('Reparado', this)"
>
  Reparado
</button>

      <button
        class="status-btn"
        onclick="filtrarStatus('Negado', this)"
      >
        Negado
      </button>

    </div>

  </div>

  <!-- LISTA -->

  <div id="lista"></div>

  <!-- NOVO -->

  <div id="novo" class="hidden">

    <div class="form-card">

      <h2>Novo Chamado</h2>

      <select id="tipo" class="input">
        <option>Reparo</option>
        <option>Compra</option>
      </select>

      <input
        id="titulo"
        class="input"
        placeholder="Título"
      >

      <textarea
        id="descricao"
        class="input"
        placeholder="Descrição"
      ></textarea>

      <input
        id="link"
        class="input"
        placeholder="Link / Referência"
      >

      <button
        class="btn btn-full"
        onclick="criar()"
      >
        Salvar Chamado
      </button>

    </div>

  </div>

</div>

<!-- MODAL -->

<div id="modal" class="modal hidden">

  <div class="modal-content">

    <div id="mTitulo" class="modal-title"></div>

    <div id="mDesc" class="info"></div>

    <div id="mInfo" class="info"></div>

    <div id="adminArea" class="hidden">

      <label class="label">
        Status
      </label>

      <select id="mStatus" class="input">

        <option>Aberto</option>
        <option>Em Orçamento</option>
        <option>Comprado</option>
        <option>Reparado</option>
        <option>Negado</option>

      </select>

      <label class="label">
        Valor
      </label>

      <input
        id="mValor"
        class="input"
        placeholder="R$ 0,00"
        oninput="formatarMoeda(this)"
      >

      <label class="label">
        Data
      </label>

      <input
        id="mData"
        type="date"
        class="input"
      >

      <button
        class="btn btn-full"
        onclick="salvarAdmin()"
      >
        Salvar Alterações
      </button>

    </div>

    <button
      class="btn btn-full"
      style="margin-top:14px"
      onclick="fecharModal()"
    >
      Fechar
    </button>

  </div>

</div>

<!-- NAV -->

<div id="nav" class="nav hidden">

  <button onclick="mostrarLista()">
    🏠
  </button>

  <button onclick="mostrarNovo()">
    ➕
  </button>

</div>

<script>

const supabaseClient = window.supabase.createClient(
  'https://azltlpjyyqecurmebffm.supabase.co',
  'sb_publishable_ODDfIVnGOb1csV9DA8kURQ_pbKPeQNO'
)

let user = null
let isAdmin = false
let atual = null
let chamadosCache = []
let filtroAtual = 'Todos'

window.addEventListener('load', async () => {

  const saved =
    localStorage.getItem('user')

  if(!saved) return

  user = JSON.parse(saved)

  document.getElementById('nome').innerText =
    user.nome_guerra || user.nome

  document.getElementById('loginScreen')
    .classList.add('hidden')

  document.getElementById('app')
    .classList.remove('hidden')

  document.getElementById('nav')
    .classList.remove('hidden')

  carregarSaldo()
  carregarChamados()
})

async function login(){

  const id =
    document.getElementById('idFunc')
    .value.trim()

  const senha =
    document.getElementById('senha')
    .value.trim()

  const { data, error } =
    await supabaseClient
    .from('usuarios')
    .select('*')
    .eq('id_func', id)
    .single()

  if(
    error ||
    !data ||
    data.senha !== senha
  ){
    alert('Login inválido')
    return
  }

  user = data

  localStorage.setItem(
    'user',
    JSON.stringify(data)
  )

  document.getElementById('nome').innerText =
    data.nome_guerra || data.nome

  document.getElementById('loginScreen')
    .classList.add('hidden')

  document.getElementById('app')
    .classList.remove('hidden')

  document.getElementById('nav')
    .classList.remove('hidden')

  carregarSaldo()
  carregarChamados()
}

function logout(){

  localStorage.removeItem('user')

  location.reload()
}

function toggleAdmin(){

  if(isAdmin){

    isAdmin = false

    document.getElementById('adminBadge')
      .classList.add('hidden')

    document.getElementById('btnAdmin')
      .innerText = '🔐 Admin'

    return
  }

  const senha = prompt('Senha Admin')

  if(senha === '123456'){

    isAdmin = true

    document.getElementById('adminBadge')
      .classList.remove('hidden')

    document.getElementById('btnAdmin')
      .innerText = '🚪 Admin'

  }else{

    alert('Senha inválida')
  }
}

async function carregarSaldo(){

  const { data } =
    await supabaseClient
    .from('financeiro')
    .select('*')
    .single()

  document.getElementById('saldo').innerText =
    Number(
      data?.saldo_atual || 0
    ).toLocaleString(
      'pt-BR',
      {
        style:'currency',
        currency:'BRL'
      }
    )
}

async function ajustarSaldo(){

  if(!isAdmin){
    alert('Somente admin')
    return
  }

  const valor = prompt('Novo saldo:')

  if(!valor) return

  await supabaseClient
    .from('financeiro')
    .update({
      saldo_atual:Number(valor)
    })
    .eq('id',1)

  carregarSaldo()
}

async function carregarChamados(){

  const { data, error } =
    await supabaseClient
    .from('chamados')
    .select('*')
    .order('id',{ascending:false})

  if(error){
    console.log(error)
    return
  }

  chamadosCache = data || []

  renderChamados()

  atualizarDashboard()
}

function atualizarDashboard(){

  document.getElementById('dTotal').innerText =
    chamadosCache.length

  document.getElementById('dAberto').innerText =
    chamadosCache.filter(c =>
      c.status === 'Aberto'
    ).length

  document.getElementById('dOrcamento').innerText =
  chamadosCache.filter(c =>
    c.status === 'Em Orçamento'
  ).length

document.getElementById('dFinal').innerText =
  chamadosCache.filter(c =>
    c.status === 'Comprado' ||
    c.status === 'Reparado'
  ).length
  }

function renderChamados(){

  const lista =
    document.getElementById('lista')

  lista.innerHTML = ''

  let listaFiltrada =
    [...chamadosCache]

  const termo =
    document.getElementById('busca')
    .value.toLowerCase()

  if(termo){

    listaFiltrada =
      listaFiltrada.filter(c => {

      return (
        (c.titulo || '')
        .toLowerCase()
        .includes(termo)

        ||

        (c.descricao || '')
        .toLowerCase()
        .includes(termo)
      )
    })
  }

  if(filtroAtual !== 'Todos'){

    listaFiltrada =
      listaFiltrada.filter(c =>
      c.status === filtroAtual
    )
  }

  listaFiltrada.forEach(c => {

    let classe = 'aberto'

    if(c.status === 'Em Orçamento')
  classe = 'emorcamento'

if(
  c.status === 'Comprado' ||
  c.status === 'Reparado'
)
  classe = 'finalizado'

    if(c.status === 'Negado')
      classe = 'negado'

    const div =
      document.createElement('div')

    div.className = 'item'

    div.innerHTML = `

      <div class="item-top">

        <div class="item-title">
          ${c.titulo || '-'}
        </div>

        <div class="status ${classe}">
          ${c.status || '-'}
        </div>

      </div>

      <div class="item-desc">
        ${c.descricao || 'Sem descrição'}
      </div>

      <div class="item-footer">

        <div>
          💰
          ${
            Number(c.valor || 0)
            .toLocaleString(
              'pt-BR',
              {
                style:'currency',
                currency:'BRL'
              }
            )
          }
        </div>

        <div>
          📅 ${c.data || '-'}
        </div>

      </div>
    `

    div.onclick =
      () => abrirModal(c.id)

    lista.appendChild(div)
  })
}

function filtrarChamados(){
  renderChamados()
}

function filtrarStatus(status, el){

  filtroAtual = status

  document
    .querySelectorAll('.status-btn')
    .forEach(btn =>
      btn.classList.remove('active')
    )

  el.classList.add('active')

  renderChamados()
}

async function abrirModal(id){

  const { data } =
    await supabaseClient
    .from('chamados')
    .select('*')
    .eq('id', id)
    .single()

  atual = data

  document.getElementById('mTitulo').innerText =
    data.titulo || '-'

  document.getElementById('mDesc').innerText =
    data.descricao || '-'

  document.getElementById('mInfo').innerHTML = `

    <b>Tipo:</b>
    ${data.tipo || '-'}
    <br><br>

    <b>Status:</b>
    ${data.status || '-'}
    <br><br>

    <b>Valor:</b>
    ${
      Number(data.valor || 0)
      .toLocaleString(
        'pt-BR',
        {
          style:'currency',
          currency:'BRL'
        }
      )
    }

    <br><br>

    <b>Data:</b>
    ${data.data || '-'}
    <br><br>

    ${
      data.link
      ? `
        <a
          href="${data.link}"
          target="_blank"
          style="
            color:#2563eb;
            font-weight:700;
          "
        >
          🔗 Abrir Link
        </a>
      `
      : ''
    }
  `

  document.getElementById('modal')
    .classList.remove('hidden')

  if(isAdmin){

    document.getElementById('adminArea')
      .classList.remove('hidden')

    document.getElementById('mStatus').value =
      data.status || ''

    document.getElementById('mValor').value =
      data.valor
      ? 'R$ ' +
        Number(data.valor)
        .toFixed(2)
        .replace('.',',')
      : ''

    document.getElementById('mData').value =
      data.data || ''

  }else{

    document.getElementById('adminArea')
      .classList.add('hidden')
  }
}

function fecharModal(){

  document.getElementById('modal')
    .classList.add('hidden')
}

async function salvarAdmin(){

  if(!isAdmin){
    alert('Somente admin')
    return
  }

  const valorTexto =
    document.getElementById('mValor')
    .value

  const valor =
    Number(
      valorTexto
        .replace('R$','')
        .replace(/\./g,'')
        .replace(',','.')
        .trim()
    ) || 0

  const status =
    document.getElementById('mStatus')
    .value

  const dataExec =
    document.getElementById('mData')
    .value

  const payload = {
  status: status,
  valor: valor,
  data: dataExec
}

// desconta apenas na primeira finalização
const statusAnterior = atual.status

if(
  (
    status === 'Comprado' ||
    status === 'Reparado'
  )
  &&
  (
    statusAnterior !== 'Comprado' &&
    statusAnterior !== 'Reparado'
  )
){

  const { data: financeiro } =
    await supabaseClient
    .from('financeiro')
    .select('*')
    .eq('id',1)
    .single()

  const saldoAtual =
    Number(financeiro?.saldo_atual || 0)

  const novoSaldo =
    saldoAtual - valor

  await supabaseClient
    .from('financeiro')
    .update({
      saldo_atual: novoSaldo
    })
    .eq('id',1)
}

const { error } =
  await supabaseClient
  .from('chamados')
  .update(payload)
  .eq('id', atual.id)

if(error){

  console.log(error)

  alert(
    'Erro ao salvar.\n' +
    error.message
  )

  return
}

fecharModal()
  carregarSaldo()
  carregarChamados()
}

async function criar(){

  const titulo =
    document.getElementById('titulo')
    .value.trim()

  if(!titulo){
    alert('Informe o título')
    return
  }

  const payload = {

    nome_solicitante:
      user.nome_guerra || user.nome,

    matricula_solicitante:
      String(user.id_func || ''),

    tipo:
      document.getElementById('tipo')
      .value,

    titulo: titulo,

    descricao:
      document.getElementById('descricao')
      .value,

    link:
      document.getElementById('link')
      .value,

    status:'Aberto',

    valor:0,

    data:
      new Date()
      .toISOString()
      .slice(0,10)
  }

  const { error } =
    await supabaseClient
    .from('chamados')
    .insert([payload])

  if(error){

    console.log(error)

    alert(
      'Erro ao criar chamado.\n' +
      error.message
    )

    return
  }

  alert('Chamado criado')

  document.getElementById('titulo').value = ''
  document.getElementById('descricao').value = ''
  document.getElementById('link').value = ''

  mostrarLista()

  carregarChamados()
}

function mostrarNovo(){

  document.getElementById('novo')
    .classList.remove('hidden')

  document.getElementById('lista')
    .classList.add('hidden')

  document.querySelector('.dashboard')
    .classList.add('hidden')

  document.querySelector('.filtro-area')
    .classList.add('hidden')
}

function mostrarLista(){

  document.getElementById('novo')
    .classList.add('hidden')

  document.getElementById('lista')
    .classList.remove('hidden')

  document.querySelector('.dashboard')
    .classList.remove('hidden')

  document.querySelector('.filtro-area')
    .classList.remove('hidden')
}

function formatarMoeda(campo){

  let valor = campo.value

  valor = valor.replace(/\D/g,'')

  valor = (Number(valor) / 100)
    .toFixed(2) + ''

  valor = valor.replace('.',',')

  valor = valor.replace(
    /(\d)(?=(\d{3})+(?!\d))/g,
    '$1.'
  )

  campo.value = 'R$ ' + valor
}

setInterval(() => {
  carregarChamados()
}, 15000)

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js')
}

</script>
