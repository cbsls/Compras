<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chamados de Manutenção</title>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const SUPABASE_URL = 'https://azltlpjyyqecurmebffm.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6bHRscGp5eXFlY3VybWViZmZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTk1MjcsImV4cCI6MjA5MDYzNTUyN30._bmJBqjEZKWS18YwiKEjO_MP8WerOyBacuM7FaQRhV0'

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

let usuarioLogado = null
let chamados = []

const $ = (id) => document.getElementById(id)

function showMessage(msg) {
  alert(msg)
}

// 🔐 LOGIN
async function loginPorIdFunc() {
  const id = $('login-id-func').value.trim()

  if (!id) {
    showMessage('Informe o ID')
    return
  }

  const { data, error } = await supabase
    .from('usuarios')
    .select('*')
    .ilike('id_func', `%${id}%`)
    .limit(1)

  if (error) {
    showMessage('Erro ao conectar com o banco')
    console.error(error)
    return
  }

  if (!data || !data.length) {
    showMessage('Usuário não encontrado')
    return
  }

  usuarioLogado = data[0]
  localStorage.setItem('usuarioLogado', JSON.stringify(usuarioLogado))

  $('tela-login').style.display = 'none'
  $('app').style.display = 'block'

  loadTickets()
}

// 🚪 LOGOUT
function logout() {
  usuarioLogado = null
  localStorage.removeItem('usuarioLogado')
  location.reload()
}

// 📥 CARREGAR CHAMADOS
async function loadTickets() {
  const { data, error } = await supabase
    .from('chamados')
    .select('*')
    .order('created_at', { ascending: false })

  if (error) {
    showMessage('Erro ao carregar chamados')
    console.error(error)
    return
  }

  chamados = data || []
  renderTickets()
}

// ➕ CRIAR CHAMADO
async function createTicket() {
  if (!usuarioLogado) {
    showMessage('Faça login primeiro')
    return
  }

  const titulo = $('titulo').value.trim().toUpperCase()
  const descricao = $('descricao').value.trim()
  const local = $('local').value.trim().toUpperCase()

  if (!titulo) {
    showMessage('Título obrigatório')
    return
  }

  const { error } = await supabase.from('chamados').insert([{
    nome_solicitante: usuarioLogado.nome,
    matricula_solicitante: usuarioLogado.id_func,
    titulo,
    descricao,
    local,
    status: 'Aguardando triagem',
    prioridade: 'Média'
  }])

  if (error) {
    showMessage('Erro ao criar chamado')
    console.error(error)
    return
  }

  clearForm()
  loadTickets()
}

// 🧹 LIMPAR FORM
function clearForm() {
  $('titulo').value = ''
  $('descricao').value = ''
  $('local').value = ''
}

// 📋 RENDER
function renderTickets() {
  const lista = $('lista')

  if (!lista) return

  lista.innerHTML = chamados.map(c => `
    <div style="border:1px solid #ccc; padding:10px; margin:10px 0">
      <b>${c.titulo}</b><br>
      ${c.descricao || ''}<br>
      <small>${c.status}</small>
    </div>
  `).join('')
}

// 🔄 RESTAURAR LOGIN
function init() {
  const saved = localStorage.getItem('usuarioLogado')

  if (saved) {
    usuarioLogado = JSON.parse(saved)
    $('tela-login').style.display = 'none'
    $('app').style.display = 'block'
    loadTickets()
  }
}

// 🌍 GLOBAL
window.loginPorIdFunc = loginPorIdFunc
window.createTicket = createTicket
window.logout = logout

document.addEventListener('DOMContentLoaded', init)

</script>

<style>
body { font-family: Arial; padding:20px }
input, textarea, button { width:100%; margin:5px 0; padding:10px }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="tela-login">
  <h2>Login</h2>
  <input id="login-id-func" placeholder="ID Funcional"/>
  <button onclick="loginPorIdFunc()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <button onclick="logout()">Sair</button>

  <h2>Novo Chamado</h2>
  <input id="titulo" placeholder="Título"/>
  <textarea id="descricao" placeholder="Descrição"></textarea>
  <input id="local" placeholder="Local"/>
  <button onclick="createTicket()">Abrir Chamado</button>

  <h2>Chamados</h2>
  <div id="lista"></div>

</div>

</body>
</html>
