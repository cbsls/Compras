<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Reclamações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light">
    <div class="container my-5">
        <!-- Formulário de Novo Chamado -->
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-primary text-white text-center py-4">
                        <h3 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Novo Chamado</h3>
                    </div>
                    <div class="card-body p-4">
                        <form id="newTicketForm">
                            <div class="mb-4">
                                <label for="title" class="form-label fw-bold">Título *</label>
                                <input type="text" class="form-control form-control-lg" id="title" required>
                            </div>
                            <div class="mb-4">
                                <label for="name" class="form-label fw-bold">Nome *</label>
                                <select class="form-select form-select-lg" id="name" required>
                                    <option value="">Selecione o militar...</option>
                                    <option value="1º TEN MARCELO">1º TEN MARCELO</option>
                                    <option value="1º SGT VICENTE">1º SGT VICENTE</option>
                                    <option value="1º SGT DIEFERSON">1º SGT DIEFERSON</option>
                                    <option value="1º SGT BATISTA">1º SGT BATISTA</option>
                                    <option value="2º SGT ANDERSON">2º SGT ANDERSON</option>
                                    <option value="2º SGT VINICIUS">2º SGT VINICIUS</option>
                                    <option value="2º SGT LISCANO">2º SGT LISCANO</option>
                                    <option value="SD TOMASCHEWSKI">SD TOMASCHEWSKI</option>
                                    <option value="SD CAMACHO">SD CAMACHO</option>
                                    <option value="SD ISQUIERDO">SD ISQUIERDO</option>
                                    <option value="SD BORGES">SD BORGES</option>
                                    <option value="SD BATISTA">SD BATISTA</option>
                                    <option value="SD MAX">SD MAX</option>
                                    <option value="SD WILLIAM">SD WILLIAM</option>
                                    <option value="SD MOTTA">SD MOTTA</option>
                                    <option value="SD SOARES">SD SOARES</option>
                                    <option value="SD PEGLOW">SD PEGLOW</option>
                                    <option value="SD LARSSON">SD LARSSON</option>
                                    <option value="NÃO IDENTIFICADO">NÃO IDENTIFICADO</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label for="local" class="form-label fw-bold">Local *</label>
                                <input type="text" class="form-control form-control-lg" id="local" required>
                            </div>
                            <div class="mb-4">
                                <label for="description" class="form-label fw-bold">Descrição</label>
                                <textarea class="form-control" id="description" rows="4" placeholder="Descreva o problema (opcional)"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-bold shadow">
                                <i class="bi bi-send me-2"></i>Criar Chamado
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <hr class="my-5">

        <!-- Lista de Chamados -->
        <h2 class="text-center mb-5 text-primary fw-bold">Chamados Recentes</h2>
        <div id="ticketsContainer" class="row g-4"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        // Configuração do Supabase - SUBSTITUA pelos seus valores
        const supabaseUrl = 'https://your-project.supabase.co';
        const supabaseKey = 'your-anon-key';
        const supabase = createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById('newTicketForm');

        async function createTicket(e) {
            e.preventDefault();

            const title = document.getElementById('title').value.toUpperCase().trim();
            const name = document.getElementById('name').value.toUpperCase().trim();
            const local = document.getElementById('local').value.toUpperCase().trim();
            const description = document.getElementById('description').value.trim();

            // Validação apenas para campos obrigatórios
            if (!title || !name || !local) {
                alert('Por favor, preencha Título, Nome e Local.');
                return;
            }

            const { error } = await supabase
                .from('chamados')
                .insert([
                    {
                        titulo: title,
                        nome: name,
                        local: local,
                        descricao: description || null
                    }
                ]);

            if (error) {
                console.error('Erro:', error);
                alert('Erro ao criar chamado: ' + error.message);
            } else {
                form.reset();
                loadTickets();
                alert('Chamado criado com sucesso!');
            }
        }

        async function loadTickets() {
            const { data, error } = await supabase
                .from('chamados')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Erro ao carregar chamados:', error);
                return;
            }

            const container = document.getElementById('ticketsContainer');
            if (data.length === 0) {
                container.innerHTML = '<div class="col-12"><div class="text-center py-5"><h5 class="text-muted">Nenhum chamado registrado ainda.</h5></div></div>';
                return;
            }

            container.innerHTML = data.map(ticket => `
                <div class="col-lg-6 col-xl-4">
                    <div class="card h-100 shadow-sm border-0 hover-shadow">
                        <div class="card-header bg-info text-white py-3">
                            <h6 class="mb-0 fw-bold">${ticket.titulo}</h6>
                        </div>
                        <div class="card-body d-flex flex-column">
                            <p class="card-text"><strong>Nome:</strong> ${ticket.nome}</p>
                            <p class="card-text"><strong>Local:</strong> ${ticket.local}</p>
                            ${ticket.descricao ? `<p class="card-text"><strong>Descrição:</strong> ${ticket.descricao}</p>` : ''}
                            <p class="card-text mt-auto small text-muted">Criado em: ${new Date(ticket.created_at).toLocaleString('pt-BR')}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Eventos
        form.addEventListener('submit', createTicket);
        loadTickets();

        // Estilo hover simples
        document.addEventListener('DOMContentLoaded', function() {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                card.addEventListener('mouseenter', () => card.style.boxShadow = '0 0.5rem 1rem rgba(0,0,0,.15)');
                card.addEventListener('mouseleave', () => card.style.boxShadow = '0 0.125rem 0.25rem rgba(0,0,0,.075)');
            });
        });
    </script>
    <style>
        .hover-shadow {
            transition: box-shadow 0.3s ease;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</body>
</html>
