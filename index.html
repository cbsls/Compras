<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📋 Compras CB SLS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#075E54">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta name="apple-mobile-web-app-title" content="Solicitações">
  
<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,Helvetica,sans-serif;
}

body{
  background:linear-gradient(
    180deg,
    #075E54 0 120px,
    #efeae2 120px 100%
  );
  color:#111b21;
}

/* LOGIN */

.login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.login-card{
  width:100%;
  max-width:420px;
  background:#fff;
  border-radius:22px;
  padding:24px;
  box-shadow:0 5px 20px rgba(0,0,0,.12);
}

.login-title{
  font-size:28px;
  font-weight:900;
  margin-bottom:20px;
  color:#075E54;
}

.input{
  width:100%;
  border:none;
  background:#f1f5f9;
  padding:15px;
  border-radius:14px;
  margin-top:12px;
  font-size:15px;
}

.btn{
  border:none;
  background:#075E54;
  color:#fff;
  padding:14px;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
}

.btn-full{
  width:100%;
  margin-top:14px;
}

/* APP */

.hidden{
  display:none !important;
}

.header{
  background:linear-gradient(
    180deg,
    #075E54,
    #0b7064
  );
  color:#fff;
  padding:22px;
  border-radius:0 0 30px 30px;
  position:sticky;
  top:0;
  z-index:100;
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.user-name{
  font-size:28px;
  font-weight:900;
}

.user-sub{
  opacity:.9;
  margin-top:4px;
}

.admin-badge{
  background:#25D366;
  padding:10px 14px;
  border-radius:16px;
  font-weight:800;
  font-size:13px;
}

.saldo{
  font-size:42px;
  font-weight:900;
  margin-top:18px;
}

.top-actions{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.top-actions button{
  flex:1;
}

/* DASH */

.dashboard{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:14px;
}

@media(min-width:768px){

  .dashboard{
    grid-template-columns:repeat(4,1fr);
  }

}

.dash-card{
  background:#fff;
  border-radius:18px;
  padding:16px;
  text-align:center;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  min-width:0;
}

.dash-number{
  font-size:28px;
  font-weight:900;
  color:#075E54;
}

.dash-label{
  color:#64748b;
  font-size:12px;
  margin-top:6px;
  line-height:1.3;
  word-break:break-word;
}

/* FILTROS */

.filtro-area{
  padding:0 14px;
}

.search{
  width:100%;
  border:none;
  background:#fff;
  padding:15px;
  border-radius:18px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* LISTA */

#lista{
  padding:14px;
  padding-bottom:120px;
}

.item{
  background:#fff;
  border-radius:18px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.item-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.item-title{
  font-size:22px;
  font-weight:900;
}

.item-desc{
  margin-top:10px;
  color:#64748b;
  line-height:1.5;
}

.item-footer{
  margin-top:16px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
  color:#475569;
}

.status{
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.aberto{
  background:#dbeafe;
  color:#1d4ed8;
}

.emorcamento{
  background:#fef3c7;
  color:#b45309;
}

.finalizado{
  background:#dcfce7;
  color:#15803d;
}

.negado{
  background:#fee2e2;
  color:#b91c1c;
}

/* NOVO */

#novo{
  padding:14px;
  padding-bottom:120px;
}

.form-card{
  background:#fff;
  border-radius:18px;
  padding:20px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* NAV */

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:14px 0;
  box-shadow:0 -5px 20px rgba(0,0,0,.12);
  border-radius:22px 22px 0 0;
  z-index:999;
}

.nav button{
  border:none;
  background:none;
  font-size:28px;
  cursor:pointer;
}

/* MODAL */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:flex;
  align-items:flex-end;
  z-index:9999;
}

.modal-content{
  width:100%;
  background:#fff;
  border-radius:28px 28px 0 0;
  padding:24px;
  max-height:90vh;
  overflow:auto;
}

.modal-title{
  font-size:28px;
  font-weight:900;
}

.info{
  margin-top:18px;
  color:#475569;
  line-height:1.6;
}

.label{
  display:block;
  margin-top:16px;
  font-weight:800;
}

/* TOAST */

.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#075E54;
  color:#fff;
  padding:14px 18px;
  border-radius:14px;
  font-weight:700;
  z-index:999999;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
  opacity:0;
  transition:.3s;
}

.toast.show{
  opacity:1;
  top:35px;
}

.toast.error{
  background:#dc2626;
}

.toast.warning{
  background:#d97706;
}
  
</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginScreen" class="login-screen">

  <div class="login-card">

    <div class="login-title">
      Demanda de Pedidos
    </div>

    <input
      id="idFunc"
      class="input"
      placeholder="ID Funcional"
    >

    <input
      id="senha"
      type="password"
      class="input"
      placeholder="Senha"
    >

    <button
      class="btn btn-full"
      onclick="login()"
    >
      Entrar
    </button>

  </div>

</div>

<!-- APP -->

<div id="app" class="hidden">

  <div class="header">

    <div class="header-top">

      <div>

        <div id="nome" class="user-name">
          -
        </div>

        <div class="user-sub">
          CB São Lourenço do Sul
        </div>

      </div>

      <div
        id="adminBadge"
        class="admin-badge hidden"
      >
        ADMIN
      </div>

    </div>

    <div id="saldo" class="saldo">
      R$ 0,00
    </div>

    <div class="top-actions">

      <button
        class="btn"
        onclick="ajustarSaldo()"
      >
        💰 Saldo
      </button>

      <button
        id="btnAdmin"
        class="btn"
        onclick="toggleAdmin()"
      >
        🔐 Admin
      </button>

      <button
        class="btn"
        onclick="logout()"
      >
        🚪 Sair
      </button>

    </div>

  </div>

  <!-- DASH -->

  <div class="dashboard">

    <div class="dash-card">
      <div id="dTotal" class="dash-number">0</div>
      <div class="dash-label">Total</div>
    </div>

    <div class="dash-card">
      <div id="dAberto" class="dash-number">0</div>
      <div class="dash-label">Abertos</div>
    </div>

    <div class="dash-card">
  <div id="dOrcamento" class="dash-number">0</div>
  <div class="dash-label">Orçamento</div>
</div>

<div class="dash-card">
  <div id="dFinal" class="dash-number">0</div>
 <div class="dash-label">
  Comprados/Reparados
</div>
</div>

  </div>

  <!-- FILTRO -->

  <div class="filtro-area">

    <input
      id="busca"
      class="search"
      placeholder="Buscar Solicitações..."
      onkeyup="filtrarChamados()"
    >

    <select
  id="filtroStatus"
  class="input"
  onchange="filtrarSelectStatus()"
  style="
    margin-top:14px;
    background:#fff;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
  "
>

  <option value="Todos">
    Todos
  </option>

  <option value="Aberto">
    Aberto
  </option>

  <option value="Em Orçamento">
    Orçamento
  </option>

  <option value="Comprado">
    Comprado
  </option>

  <option value="Reparado">
    Reparado
  </option>

  <option value="Negado">
    Negado
  </option>

</select>

  </div>

  <!-- LISTA -->

  <div id="lista"></div>

  <!-- NOVO -->

  <div id="novo" class="hidden">

    <div class="form-card">

      <h2>Novo Chamado</h2>

      <select id="tipo" class="input">
        <option>Reparo</option>
        <option>Compra</option>
      </select>

      <input
  id="titulo"
  class="input"
  placeholder="Título"
  style="text-transform:uppercase"
  oninput="this.value = this.value.toUpperCase()"
>

      <textarea
        id="descricao"
        class="input"
        placeholder="Descrição"
      ></textarea>

      <input
        id="link"
        class="input"
        placeholder="Link / Referência"
      >

      <button
        class="btn btn-full"
        onclick="criar()"
      >
        Salvar Chamado
      </button>

    </div>

  </div>

</div>

  <!-- RELATÓRIOS -->

<div id="relatorios" class="hidden">

  <div style="padding:14px">

    <div class="form-card">

      <h2>Relatórios PDF</h2>

      <button
        class="btn btn-full"
        onclick="gerarRelatorio('Comprado')"
      >
        📄 Comprados
      </button>

      <button
        class="btn btn-full"
        onclick="gerarRelatorio('Reparado')"
      >
        📄 Reparados
      </button>

      <button
        class="btn btn-full"
        onclick="gerarRelatorio('Em Orçamento')"
      >
        📄 Em Orçamento
      </button>

    </div>

  </div>

</div>

<!-- MODAL -->

<div id="modal" class="modal hidden">

  <div class="modal-content">

    <div id="mTitulo" class="modal-title"></div>

    <div id="mDesc" class="info"></div>

    <div id="mInfo" class="info"></div>

    <div id="adminArea" class="hidden">

      <div id="extraCampos" class="hidden">

  <label class="label">
    Local
  </label>

  <input
    id="mLocal"
    class="input"
    placeholder="Local"
  >

  <label class="label">
    Atendente
  </label>

  <input
    id="mAtendente"
    class="input"
    placeholder="Atendente"
  >

</div>
      
      <label class="label">
        Status
      </label>

     <select
  id="mStatus"
  class="input"
  onchange="controlarCamposExtras()"
>

        <option>Aberto</option>
        <option>Em Orçamento</option>
        <option>Comprado</option>
        <option>Reparado</option>
        <option>Negado</option>

      </select>

      <label class="label">
        Valor
      </label>

      <input
        id="mValor"
        class="input"
        placeholder="R$ 0,00"
        oninput="formatarMoeda(this)"
      >

      <label class="label">
        Data
      </label>

      <input
        id="mData"
        type="date"
        class="input"
      >

      <button
        class="btn btn-full"
        onclick="salvarAdmin()"
      >
        Salvar Alterações
      </button>

    </div>

    <button
      class="btn btn-full"
      style="margin-top:14px"
      onclick="fecharModal()"
    >
      Fechar
    </button>

  </div>

</div>

<!-- NAV -->

<div id="nav" class="nav hidden">

  <button onclick="mostrarLista()">
    🏠
  </button>

  <button onclick="mostrarNovo()">
    ➕
  </button>

  <button onclick="mostrarRelatorios()">
    📄
  </button>

</div>

<script>

const supabaseClient = window.supabase.createClient(
  'https://azltlpjyyqecurmebffm.supabase.co',
  'sb_publishable_ODDfIVnGOb1csV9DA8kURQ_pbKPeQNO'
)

let user = null
let isAdmin = false
let atual = null
let chamadosCache = []
let filtroAtual = 'Todos'

// 🔥 REALTIME SUPABASE

const channelChamados =
  supabaseClient
    .channel('realtime-chamados')
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'chamados'
      },
      async () => {

        await carregarChamados()
        showToast('Status atualizado')

      }
    )
    .subscribe()

const channelFinanceiro =
  supabaseClient
    .channel('realtime-financeiro')
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'financeiro'
      },
      async () => {

        await carregarSaldo()
        showToast('Saldo atualizado')

      }
    )
    .subscribe()

window.addEventListener('load', async () => {

  const saved =
    localStorage.getItem('user')

  if(!saved) return

  user = JSON.parse(saved)
  
  // 🔥 RESTAURA ADMIN

const adminSalvo =
  localStorage.getItem('adminAtivo')

if(adminSalvo === 'true'){

  isAdmin = true

  document.getElementById('adminBadge')
    .classList.remove('hidden')

  document.getElementById('btnAdmin')
    .innerText = '🚪 Sair Admin'
}

  document.getElementById('nome').innerText =
    user.nome_guerra || user.nome

  document.getElementById('loginScreen')
    .classList.add('hidden')

  document.getElementById('app')
    .classList.remove('hidden')

  document.getElementById('nav')
    .classList.remove('hidden')

  await carregarSaldo()

  await carregarChamados()

})

  function showToast(msg, tipo='success'){

  const toast =
    document.getElementById('toast')

  toast.innerText = msg

  toast.className =
    'toast show'

  if(tipo === 'error'){
    toast.classList.add('error')
  }

  if(tipo === 'warning'){
    toast.classList.add('warning')
  }

  setTimeout(() => {

    toast.classList.remove('show')

  }, 2500)
}

async function login(){

showToast('Sistema conectado')

  const id =
    document.getElementById('idFunc')
    .value.trim()

  const senha =
    document.getElementById('senha')
    .value.trim()

  const { data, error } =
    await supabaseClient
    .from('usuarios')
    .select('*')
    .eq('id_func', id)
    .single()

  if(
    error ||
    !data ||
    data.senha !== senha
  ){
    showToast('Login inválido','error')
    return
  }

  user = data

  localStorage.setItem(
    'user',
    JSON.stringify(data)
  )

  document.getElementById('nome').innerText =
    data.nome_guerra || data.nome

  document.getElementById('loginScreen')
    .classList.add('hidden')

  document.getElementById('app')
    .classList.remove('hidden')

  document.getElementById('nav')
    .classList.remove('hidden')

  carregarSaldo()
  carregarChamados()
}

function logout(){

  localStorage.removeItem('user')

  location.reload()
}

function toggleAdmin(){

  if(isAdmin){

    sairAdmin()

    return
  }

  document.getElementById('adminModal')
    .classList.remove('hidden')

  document.getElementById('adminSenha')
    .value = ''

  setTimeout(() => {

    document.getElementById('adminSenha')
      .focus()

  }, 200)
}

function fecharAdminModal(){

  document.getElementById('adminModal')
    .classList.add('hidden')
}

function confirmarAdmin(){

  let senha =
    document.getElementById('adminSenha')
    .value

  // 🔥 SOMENTE NÚMEROS

  senha = senha.replace(/\D/g,'')

  if(senha === '123456'){

    isAdmin = true

    // 🔥 SALVA ADMIN

    localStorage.setItem(
      'adminAtivo',
      'true'
    )

    document.getElementById('adminBadge')
      .classList.remove('hidden')

    document.getElementById('btnAdmin')
      .innerText = '🚪 Sair Admin'

    fecharAdminModal()

    showToast('Modo admin ativado')

  }else{

    showToast(
      'Senha inválida',
      'error'
    )
  }
}

function sairAdmin(){

  isAdmin = false

  // 🔥 REMOVE ADMIN

  localStorage.removeItem(
    'adminAtivo'
  )

  document.getElementById('adminBadge')
    .classList.add('hidden')

  document.getElementById('btnAdmin')
    .innerText = '🔐 Admin'

  showToast('Modo admin desativado')
}
async function carregarSaldo(){

  const { data } =
    await supabaseClient
    .from('financeiro')
    .select('*')
    .single()

  document.getElementById('saldo').innerText =
    Number(
      data?.saldo_atual || 0
    ).toLocaleString(
      'pt-BR',
      {
        style:'currency',
        currency:'BRL'
      }
    )
}

async function ajustarSaldo(){

  if(!isAdmin){
    showToast('Somente admin','warning')
    return
  }

  const valor =
    prompt('Novo saldo:')

  if(!valor) return

  const novoSaldo =
    Number(
      valor
        .replace(/\./g,'')
        .replace(',','.')
    )

  const { error } =
    await supabaseClient
      .from('financeiro')
      .update({
        saldo_atual: novoSaldo
      })
      .eq('id',1)

   // 🔥 ATUALIZA IMEDIATO

  document.getElementById('saldo').innerText =
    novoSaldo.toLocaleString(
      'pt-BR',
      {
        style:'currency',
        currency:'BRL'
      }
    )
}

async function carregarChamados(){

  const { data, error } =
    await supabaseClient
    .from('chamados')
    .select('*')
    .order('id',{ascending:false})

  if(error){
    console.log(error)
    return
  }

  chamadosCache = data || []

  renderChamados()

  atualizarDashboard()
}

function atualizarDashboard(){

  document.getElementById('dTotal').innerText =
    chamadosCache.length

  document.getElementById('dAberto').innerText =
    chamadosCache.filter(c =>
      c.status === 'Aberto'
    ).length

  document.getElementById('dOrcamento').innerText =
    chamadosCache.filter(c =>
      c.status === 'Em Orçamento'
    ).length

  document.getElementById('dFinal').innerText =
    chamadosCache.filter(c =>
      c.status === 'Comprado' ||
      c.status === 'Reparado'
    ).length
}
function renderChamados(){

  const lista =
    document.getElementById('lista')

  lista.innerHTML = ''

  let listaFiltrada =
    [...chamadosCache]

  const termo =
    document.getElementById('busca')
    .value.toLowerCase()

  if(termo){

    listaFiltrada =
      listaFiltrada.filter(c => {

      return (
        (c.titulo || '')
        .toLowerCase()
        .includes(termo)

        ||

        (c.descricao || '')
        .toLowerCase()
        .includes(termo)
      )
    })
  }

  if(filtroAtual !== 'Todos'){

    listaFiltrada =
      listaFiltrada.filter(c =>
      c.status === filtroAtual
    )
  }

  listaFiltrada.forEach(c => {

    let classe = 'aberto'

    if(c.status === 'Em Orçamento')
  classe = 'emorcamento'

if(
  c.status === 'Comprado' ||
  c.status === 'Reparado'
)
  classe = 'finalizado'

    if(c.status === 'Negado')
      classe = 'negado'

    const div =
      document.createElement('div')

    div.className = 'item'

    div.innerHTML = `

      <div class="item-top">

        <div class="item-title">
          ${c.titulo || '-'}
        </div>

        <div class="status ${classe}">
          ${c.status || '-'}
        </div>

      </div>

      <div class="item-desc">
        ${c.descricao || 'Sem descrição'}
      </div>

      <div class="item-footer">

        <div>
          💰
          ${
            Number(c.valor || 0)
            .toLocaleString(
              'pt-BR',
              {
                style:'currency',
                currency:'BRL'
              }
            )
          }
        </div>

        <div>
          📅 ${c.data || '-'}
        </div>

      </div>
    `

    div.onclick =
      () => abrirModal(c.id)

    lista.appendChild(div)
  })
}

function filtrarChamados(){
  renderChamados()
}

  function filtrarSelectStatus(){

  filtroAtual =
    document.getElementById('filtroStatus')
    .value

  renderChamados()
}

function filtrarStatus(status, el){

  filtroAtual = status

  document
    .querySelectorAll('.status-btn')
    .forEach(btn =>
      btn.classList.remove('active')
    )

  el.classList.add('active')

  renderChamados()
}

  function controlarCamposExtras(){

  const status =
    document.getElementById('mStatus').value

  const mostrar =
    status === 'Em Orçamento' ||
    status === 'Comprado' ||
    status === 'Reparado'

  if(mostrar){

    document.getElementById('extraCampos')
      .classList.remove('hidden')

  }else{

    document.getElementById('extraCampos')
      .classList.add('hidden')
  }
}

async function abrirModal(id){

  const { data } =
    await supabaseClient
    .from('chamados')
    .select('*')
    .eq('id', id)
    .single()

  atual = data

  document.getElementById('mTitulo').innerText =
    data.titulo || '-'

  document.getElementById('mDesc').innerText =
    data.descricao || '-'

  document.getElementById('mInfo').innerHTML = `

async function salvarAdmin(){

  if(!isAdmin){
    alert('Somente admin')
    return
  }

  const valorTexto =
    document.getElementById('mValor')
    .value

  const valor =
    Number(
      valorTexto
        .replace('R$','')
        .replace(/\./g,'')
        .replace(',','.')
        .trim()
    ) || 0

  const status =
    document.getElementById('mStatus')
    .value

  const dataExec =
    document.getElementById('mData')
    .value

  const local =
  document.getElementById('mLocal')
  .value

const atendente =
  document.getElementById('mAtendente')
  .value

 const payload = {
  status: status,
  valor: valor,
  data: dataExec,
  local: local,
  atendente: atendente
}

// 🔥 PRIMEIRO ATUALIZA O CHAMADO

const { error } =
  await supabaseClient
    .from('chamados')
    .update(payload)
    .eq('id', atual.id)

if(error){

  console.log(error)

  alert(
    'Erro ao salvar.\n' +
    error.message
  )

  return
}

// 🔥 DEPOIS ATUALIZA SALDO

const statusAnterior =
  atual.status

if(
  (
    status === 'Comprado' ||
    status === 'Reparado'
  )
  &&
  (
    statusAnterior !== 'Comprado' &&
    statusAnterior !== 'Reparado'
  )
){

  const { data: financeiro } =
    await supabaseClient
      .from('financeiro')
      .select('*')
      .eq('id',1)
      .single()

  const saldoAtual =
    Number(financeiro?.saldo_atual || 0)

  const novoSaldo =
    saldoAtual - valor

  await supabaseClient
    .from('financeiro')
    .update({
      saldo_atual: novoSaldo
    })
    .eq('id',1)
}

if(error){

  console.log(error)

 showToast(
  'Erro ao salvar',
  'error'
)

  return
}

await carregarChamados()
await carregarSaldo()

fecharModal()

}

function formatarMoeda(campo){

  let valor = campo.value

  valor = valor.replace(/\D/g,'')

  valor = (Number(valor) / 100)
    .toFixed(2) + ''

  valor = valor.replace('.',',')

  valor = valor.replace(
    /(\d)(?=(\d{3})+(?!\d))/g,
    '$1.'
  )

  campo.value = 'R$ ' + valor
}

  async function gerarRelatorio(statusRelatorio){

  if(!isAdmin){
    alert('Somente admin')
    return
  }

  const { data, error } =
    await supabaseClient
      .from('chamados')
      .select('*')
      .eq('status', statusRelatorio)
      .order('data',{ascending:false})

  if(error){

    console.log(error)

    alert('Erro ao gerar relatório')

    return
  }

  const { jsPDF } = window.jspdf

  const doc = new jsPDF({
    orientation:'portrait',
    unit:'mm',
    format:'a4'
  })

  let y = 20

  doc.setFontSize(18)

  doc.text(
    `Relatório - ${statusRelatorio}`,
    14,
    y
  )

  y += 12

  // CABEÇALHO

  doc.setFontSize(10)

  doc.setFillColor(230,230,230)

  doc.rect(10, y, 190, 10, 'F')

  doc.text('Item', 12, y + 7)
  doc.text('Valor', 90, y + 7)
  doc.text('Data', 120, y + 7)
  doc.text('Local', 145, y + 7)
  doc.text('Atendente', 175, y + 7)

  y += 10

  let total = 0

  data.forEach(item => {

    const valor =
      Number(item.valor || 0)

    total += valor

    doc.rect(10, y, 190, 10)

    doc.text(
      String(item.titulo || '-')
        .slice(0,30),
      12,
      y + 7
    )

    doc.text(
      valor.toLocaleString(
        'pt-BR',
        {
          style:'currency',
          currency:'BRL'
        }
      ),
      90,
      y + 7
    )

    doc.text(
      String(item.data || '-'),
      120,
      y + 7
    )

    doc.text(
      String(item.local || '-')
        .slice(0,18),
      145,
      y + 7
    )

    doc.text(
      String(item.atendente || '-')
        .slice(0,12),
      175,
      y + 7
    )

    y += 10

    if(y > 270){

      doc.addPage()

      y = 20
    }
  })

  y += 10

  doc.setFontSize(12)

  doc.text(
    'TOTAL: ' +
    total.toLocaleString(
      'pt-BR',
      {
        style:'currency',
        currency:'BRL'
      }
    ),
    14,
    y
  )

  doc.save(
    `relatorio-${statusRelatorio}.pdf`
  )
}

  <script>

let deferredPrompt = null;

// CRIA BOTÃO INSTALAR
const installBtn = document.createElement('button');

installBtn.innerText = '📲 Instalar App';

installBtn.style.position = 'fixed';
installBtn.style.bottom = '90px';
installBtn.style.right = '14px';
installBtn.style.zIndex = '9999';
installBtn.style.border = 'none';
installBtn.style.background = '#075E54';
installBtn.style.color = '#fff';
installBtn.style.padding = '14px 18px';
installBtn.style.borderRadius = '18px';
installBtn.style.fontWeight = '700';
installBtn.style.boxShadow = '0 4px 14px rgba(0,0,0,.25)';
installBtn.style.display = 'none';

document.body.appendChild(installBtn);

// EVENTO PWA
window.addEventListener(
  'beforeinstallprompt',
  (e) => {

    e.preventDefault();

    deferredPrompt = e;

    installBtn.style.display = 'block';
  }
);

// INSTALAR
installBtn.addEventListener(
  'click',
  async () => {

    if(!deferredPrompt) return;

    deferredPrompt.prompt();

    const { outcome } =
      await deferredPrompt.userChoice;

    if(outcome === 'accepted'){

      installBtn.style.display = 'none';
    }

    deferredPrompt = null;
  }
);

// ESCONDE SE JÁ INSTALADO
window.addEventListener(
  'appinstalled',
  () => {

    installBtn.style.display = 'none';
  }
);

</script>
